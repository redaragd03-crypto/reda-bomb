<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر رضا المطور V5 | التجربة والتعلم</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9;
            --lvl1: #4ade80; --lvl2: #fbbf24; --lvl3: #f87171;
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* القائمة الجانبية للمعلومات (Flashcards) */
        .sidebar {
            width: 400px; background: #020617; border-left: 2px solid var(--accent);
            display: flex; flex-direction: column; position: fixed; right: -420px; height: 100vh; z-index: 1000; transition: 0.4s;
        }
        .sidebar.active { right: 0; }

        .card-container { padding: 20px; flex: 1; overflow-y: auto; }
        .flashcard {
            background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 15px;
            perspective: 1000px; cursor: pointer; border: 1px solid #334155;
        }
        .flashcard:hover { border-color: var(--accent); }
        .card-code { color: #facc15; font-family: monospace; display: block; margin-top: 10px; background: #000; padding: 5px; border-radius: 4px; direction: ltr; }

        /* المحتوى الرئيسي */
        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .container { width: 95%; max-width: 900px; }

        /* مختبر التجارب (Playground) */
        .playground {
            background: #000; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid var(--accent);
        }
        .playground-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--accent); font-weight: bold; }
        #codeEditor { width: 100%; height: 100px; background: transparent; color: #4ade80; border: none; font-family: monospace; outline: none; resize: vertical; direction: ltr; }
        .run-btn { background: var(--accent); color: #000; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* المستويات والأزرار */
        .level-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .lvl-btn { background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .lvl-btn.active { background: var(--accent); color: #000; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .type-btn { background: var(--panel); color: white; border: 1px solid #334155; padding: 15px; border-radius: 8px; cursor: pointer; }
        .type-btn:hover { border-color: var(--accent); }

        .results { margin-top: 20px; }
        .code-box { background: #000; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-right: 4px solid var(--accent); position: relative; }
        pre { margin: 0; color: #94a3b8; direction: ltr; white-space: pre-wrap; font-family: monospace; }
        
        .toggle-learn { background: #f59e0b; padding: 15px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding:20px; background:var(--accent); color:#000; display:flex; justify-content:space-between;">
        <strong>بطاقات تعليمية (100 معلومة)</strong>
        <button onclick="toggleSidebar()" style="cursor:pointer; background:none; border:none; font-weight:bold;">X</button>
    </div>
    <div class="card-container" id="flashcards"></div>
</div>

<div class="main-content">
    <button class="toggle-learn" onclick="toggleSidebar()">📖 فتح بطاقات التعلم الذكي</button>

    <div class="container">
        <div class="playground">
            <div class="playground-header">
                <span>🧪 مختبر التجارب السريع (JS)</span>
                <button class="run-btn" onclick="runTest()">تشغيل الكود</button>
            </div>
            <textarea id="codeEditor" placeholder="// اكتب كود JavaScript هنا لتجربته..."></textarea>
        </div>

        <h1 style="text-align:center">مختبر رضا المطور V5</h1>
        
        <div class="level-bar">
            <button class="lvl-btn active" onclick="setLevel(1, this)">مستوى 1</button>
            <button class="lvl-btn" onclick="setLevel(2, this)">مستوى 2</button>
            <button class="lvl-btn" onclick="setLevel(3, this)">مستوى 3</button>
        </div>

        <div class="grid">
            <button class="type-btn" onclick="gen('logic')">منطقية</button>
            <button class="type-btn" onclick="gen('fork')">تشعب</button>
            <button class="type-btn" onclick="gen('crash')">ذاكرة</button>
        </div>

        <div id="results" class="results"></div>
    </div>
</div>

<script>
    let level = 1;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function setLevel(l, btn) {
        level = l;
        document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // تشغيل كود المختبر
    function runTest() {
        const code = document.getElementById('codeEditor').value;
        try { eval(code); } catch(e) { alert("خطأ في الكود: " + e.message); }
    }

    // توليد البطاقات التعليمية
    const container = document.getElementById('flashcards');
    for(let i=1; i<=100; i++) {
        container.innerHTML += `
            <div class="flashcard">
                <strong>معلومة #${i}</strong>
                <p>تعلمنا أن البرمجة وسيلة قوية لحماية الأنظمة، والمهم فهم كيف يتم استهلاك الموارد.</p>
                <span class="card-code">[ Model_Code_${i} ]</span>
            </div>
        `;
    }

    const db = {
        logic: { 1: ["if(1 > 0) { console.log('OK'); }"], 2: ["setTimeout(() => alert('Hi'), 2000);"], 3: ["while(true) { /* Logical Loop */ }"] },
        fork: { 1: ["for(i=0;i<10;i++)"], 2: ["function f() { f(); }"], 3: [":(){ :|:& };:"] },
        crash: { 1: ["alert('!');"], 2: ["let s=''; while(1) s+='a';"], 3: ["setInterval(()=>window.open(),1);"] }
    };

    function gen(type) {
        const res = document.getElementById('results');
        res.innerHTML = '';
        db[type][level].forEach(c => {
            res.innerHTML += `<div class="code-box"><pre>${c}</pre></div>`;
        });
    }
</script>

</body>
</html>
