<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر رضا المطور | KALI SECRET EDITION</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --lvl1: #4ade80;
            --lvl2: #fbbf24;
            --lvl3: #f87171;
            --red-gold: #facc15;
            --warning: #ef4444;
            --kali: #2e67ff;
            --secret: #a855f7;
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        .sidebar { width: 380px; background: #020617; transition: 0.5s; position: fixed; height: 100vh; z-index: 1000; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .sidebar-right { right: -380px; border-left: 2px solid var(--accent); }
        .sidebar-left { left: -380px; border-right: 2px solid var(--red-gold); }
        .sidebar-right.active { right: 0; }
        .sidebar-left.active { left: 0; }

        .sidebar-header { padding: 20px; background: var(--accent); color: #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .header-reda { background: var(--red-gold) !important; }

        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        
        .profile-container { margin-top: 20px; margin-bottom: 25px; text-align: center; }
        .profile-img { width: 300px; height: auto; border-radius: 15px; border: 5px solid var(--red-gold); box-shadow: 0 0 30px rgba(250, 204, 21, 0.4); }

        .btn-group { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .trigger-btn { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .kali-btn { background: var(--kali); color: white; border: 2px solid white; box-shadow: 0 0 20px rgba(46, 103, 255, 0.5); }

        .kali-tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 15px; display: none; width: 90%; }
        .tool-sub-btn { background: #334155; color: white; border: 1px solid var(--kali); padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; font-weight: bold; }
        .tool-sub-btn:hover { background: var(--kali); transform: translateY(-3px); }

        .card { background: var(--panel); width: 95%; max-width: 900px; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-bottom: 30px; }
        
        .code-box { background: #000; padding: 25px; border-radius: 12px; border-right: 5px solid var(--accent); margin-top: 25px; }
        .secret-tag { background: var(--secret); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 10px; display: inline-block; }
        .code-box pre { margin: 15px 0; color: #f8fafc; font-family: monospace; direction: ltr; white-space: pre-wrap; background: #111; padding: 15px; border-radius: 5px; border: 1px solid #222; }
        
        .detail-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #334155; }
        .detail-label { color: var(--lvl2); font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="profile-container">
        <img src="13993.png" alt="المطور رضا" class="profile-img">
    </div>

    <div class="btn-group">
        <button class="trigger-btn kali-btn" onclick="toggleKaliGrid()">🐉 كالي لينكس: الأسرار والأدوات</button>
    </div>

    <div class="kali-tools-grid" id="kaliToolsGrid">
        <button class="tool-sub-btn" onclick="showSecretTool('airodump')">📡 Airodump (خفايا الـ WIFI)</button>
        <button class="tool-sub-btn" onclick="showSecretTool('nmap')">🔍 Nmap (أسرار المنافذ)</button>
        <button class="tool-sub-btn" onclick="showSecretTool('slowloris')">🌪️ Slowloris (كسر السيرفرات)</button>
        <button class="tool-sub-btn" onclick="showSecretTool('hping3')">💣 Hping3 (الفيضان النووي)</button>
    </div>

    <div class="card" id="displayArea">
        <h1 style="text-align:center; color: var(--accent); margin:0;">REDA TECH LAB (SECURED)</h1>
        <p style="text-align:center; color: #94a3b8;">اضغط على زر كالي بالأعلى لاستكشاف أسرار الأدوات</p>
    </div>
</div>

<script>
    function toggleKaliGrid() {
        const grid = document.getElementById('kaliToolsGrid');
        grid.style.display = (grid.style.display === 'grid') ? 'none' : 'grid';
    }

    const toolSecrets = {
        airodump: {
            title: "Airodump-ng: مراقب الهواء الصامت",
            secret: "السر يكمن في 'Monitor Mode'. كرت الشبكة العادي يتجاهل البيانات التي ليست موجهة له، لكن في هذا الوضع، يتحول الكرت لأذن عملاقة تسمع كل ذرة بيانات في الهواء.",
            target: "استغلال ثغرة عدم تشفير الـ Management Frames في بروتوكول 802.11.",
            usage: "يستخدم رضا هذه الأداة ليس فقط للمراقبة، بل لجمع الـ Handshake (المصافحة) التي هي مفتاح كسر كلمة السر لاحقاً.",
            code: "sudo airmon-ng start wlan0\nsudo airodump-ng wlan0mon --bssid [MAC] -c [CH] -w capture_file"
        },
        nmap: {
            title: "Nmap: أداة رسم خرائط الأعداء",
            secret: "أقوى سر هو الـ 'Stealth Scan' (-sS). الأداة لا تكمل الاتصال بالهدف (Half-open)، مما يجعل السيرفر لا يسجل محاولة الفحص كاختراق في معظم السجلات القديمة.",
            target: "الاستجابة لطلبات SYN بمختلف أنواعها لكشف جدار الحماية.",
            usage: "يعتمد عليها رضا لمعرفة 'نظام التشغيل' بدقة ومعرفة إذا كان السيرفر يعمل خلف Firewall أو Cloudflare.",
            code: "nmap -sS -Pn -p- -T4 [Target_IP]\n# -p- يفحص كل الـ 65535 منفذ لضمان عدم فوات أي شيء"
        },
        slowloris: {
            title: "Slowloris: هجوم الثقب الأسود",
            secret: "هذا الهجوم لا يحتاج لإنترنت قوي. السر هو 'البطء المقلي'. هو يرسل طلبات HTTP ناقصة ويستمر في إرسال ترويسات (Headers) وهمية كل فترة ليبقى السيرفر منتظراً للأبد.",
            target: "استنزاف الـ Maximum Concurrent Connections في سيرفرات مثل Apache.",
            usage: "يستخدمه رضا لتعطيل مواقع ضخمة من خلال جهاز كمبيوتر بسيط أو حتى موبايل، لأنه يستهلك موارد السيرفر لا موارد المهاجم.",
            code: "python3 slowloris.py example.com -s 800 -p 80\n# الرقم 800 هو عدد المقاعد التي سيحجزها في السيرفر"
        },
        hping3: {
            title: "Hping3: مطرقة الـ DDoS",
            secret: "السر العظيم هنا هو 'Spoofing' (-a). يمكنك جعل السيرفر يعتقد أن الهجوم يأتي من عنوان IP الخاص بـ Google أو حتى IP السيرفر نفسه (Land Attack).",
            target: "إغراق ذاكرة الـ Stack في المعالج بحزم SYN لا تنتهي.",
            usage: "أداة رضا المفضلة لعمل 'اختبار تحمل' حقيقي، حيث يمكنها إرسال ملايين الحزم في ثوانٍ معدودة.",
            code: "sudo hping3 -S --flood -V --rand-source -p 80 [Target_IP]\n# --rand-source تجعل الهجوم يبدو وكأنه من آلاف الأجهزة المختلفة"
        }
    };

    function showSecretTool(t) {
        const area = document.getElementById('displayArea');
        const data = toolSecrets[t];
        area.innerHTML = `
            <div class="code-box" style="border-right-color: var(--kali)">
                <span class="secret-tag">تصنيف: سري للغاية / رضا</span>
                <h2 style="color:var(--kali); margin:0 0 20px 0;">${data.title}</h2>
                
                <div class="detail-item">
                    <span class="detail-label">🔒 السر التقني (كيف تعمل؟):</span>
                    <p style="font-size:0.95rem; line-height:1.6;">${data.secret}</p>
                </div>

                <div class="detail-item">
                    <span class="detail-label">🎯 الثغرة المستهدفة:</span>
                    <p style="font-size:0.95rem;">${data.target}</p>
                </div>

                <div class="detail-item">
                    <span class="detail-label">💡 ملاحظة المطور رضا:</span>
                    <p style="font-size:0.95rem; font-style: italic; color: var(--red-gold);">${data.usage}</p>
                </div>

                <div class="detail-item" style="border:none;">
                    <span class="detail-label">💻 الكود البرمجي (الأوامر):</span>
                    <pre>${data.code}</pre>
                </div>
            </div>`;
        
        // التمرير التلقائي للأسفل لرؤية النتائج
        window.scrollTo({ top: area.offsetTop, behavior: 'smooth' });
    }
</script>
</body>
</html>
