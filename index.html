<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر رضا المطور | DARK EDITION</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #0a0a0a;
            --accent: #ef4444; /* أحمر دموي للوضع السوداوي */
            --text: #d1d5db;
            --reda-gold: #facc15;
            --terminal-green: #00ff41;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
            transition: transform 0.1s;
        }

        /* تأثير الانهيار (Screen Shake) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(0deg); }
            60% { transform: translate(-3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .shaking { animation: shake 0.2s infinite; background: #200 !important; }

        .sidebar-right, .sidebar-left {
            width: 380px;
            background: #000;
            transition: 0.5s;
            position: fixed;
            height: 100vh;
            z-index: 1000;
            overflow-y: auto;
            border: 1px solid #222;
        }
        .sidebar-right { right: -380px; }
        .sidebar-left { left: -380px; }
        .sidebar-right.active { right: 0; border-left: 2px solid var(--accent); }
        .sidebar-left.active { left: 0; border-right: 2px solid var(--reda-gold); }

        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .profile-img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--reda-gold);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
            object-fit: cover; cursor: pointer; transition: 0.3s;
        }
        .profile-img:hover { transform: scale(1.1); filter: grayscale(1); }

        .card { 
            background: var(--panel); width: 90%; max-width: 800px; padding: 40px; 
            border-radius: 5px; border: 1px solid #111; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .btn-group { display: flex; gap: 20px; align-items: center; margin-bottom: 30px; }
        
        .level-btn { 
            background: #111; color: #444; border: 1px solid #222; 
            padding: 10px 20px; cursor: pointer; font-weight: bold;
        }
        .level-btn.active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .type-btn { 
            background: #000; color: #666; border: 1px solid #222; 
            padding: 15px; cursor: pointer; transition: 0.2s;
        }
        .type-btn:hover { color: #fff; border-color: #fff; }

        .code-box { 
            background: #000; padding: 20px; border: 1px solid var(--accent); 
            margin-top: 20px; position: relative;
        }
        .code-box pre { color: var(--terminal-green); font-size: 0.9rem; }

        #system-status { font-size: 0.7rem; color: #444; margin-top: 10px; }
    </style>
</head>
<body id="mainBody">

<div class="sidebar-right" id="sidebarRight">
    <div style="padding:20px; background: #111; color: var(--accent);">[ ARCHIVE_DATA ]</div>
    <div id="infoItems"></div>
</div>

<div class="sidebar-left" id="sidebarLeft">
    <div style="padding:20px; background: #111; color: var(--reda-gold);">[ REDA_LOGS ]</div>
    <div style="padding: 15px;">
        <p style="color: #888; font-size: 0.8rem;">بصمة المطور: رضا رجب</p>
        <p style="color: var(--accent); font-size: 0.7rem;">تحذير: المستويات العالية قد تؤدي لانهيار محاكاة النظام.</p>
    </div>
</div>

<div class="main-content">
    <div class="btn-group">
        <button class="level-btn" onclick="toggleSide('Right')">الموسوعة</button>
        <img src="13993.png" class="profile-img" onclick="toggleSide('Left')" alt="رضا رجب">
        <button class="level-btn" onclick="toggleSide('Left')">الملف الشخصي</button>
    </div>

    <div class="card">
        <h2 style="color: #fff; letter-spacing: 5px;">REDA_LAB_V4.exe</h2>
        <div id="system-status">STATUS: SYSTEM_READY // ENCRYPTION: ACTIVE</div>

        <div style="display:flex; justify-content: center; gap: 10px; margin: 20px 0;">
            <button class="level-btn active" id="l1" onclick="setLevel(1)">LVL 01</button>
            <button class="level-btn" id="l2" onclick="setLevel(2)">LVL 02</button>
            <button class="level-btn" id="l3" onclick="setLevel(3)" style="color: red;">LVL 03 [CRITICAL]</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <button class="type-btn" onclick="generate('logic')">LOGIC_BOMB</button>
            <button class="type-btn" onclick="generate('crash')">MEMORY_DRAIN</button>
            <button class="type-btn" onclick="generate('network')">NET_FLOOD</button>
        </div>

        <div id="results"></div>
    </div>
</div>

<script>
    let currentLevel = 1;
    function toggleSide(s) { document.getElementById('sidebar' + s).classList.toggle('active'); }
    
    function setLevel(l) {
        currentLevel = l;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        if(l === 1) document.getElementById('l1').classList.add('active');
        if(l === 2) document.getElementById('l2').classList.add('active');
        if(l === 3) document.getElementById('l3').classList.add('active');
    }

    const repo = {
        logic: { 1: ["alert('System Ping');"], 2: ["while(1){console.log('Error')}"], 3: ["KILL_PROCESS_ALL"] },
        crash: { 1: ["[]"], 2: ["new Array(1000000)"], 3: ["SYSTEM_OVERFLOW_INIT"] },
        network: { 1: ["ping 127.0.0.1"], 2: ["fetch('/')"], 3: ["PACKET_STORM_START"] }
    };

    function generate(t) {
        const body = document.getElementById('mainBody');
        const res = document.getElementById('results');
        
        if (currentLevel === 3) {
            body.classList.add('shaking');
            res.innerHTML = `<div class="code-box" style="border-color:red">
                <pre style="color:red">⚠️ CRITICAL FAILURE: EXECUTING ${t.toUpperCase()}...
                ACCESSING CORE...
                SHUTTING DOWN SIMULATION...</pre>
            </div>`;
            setTimeout(() => {
                body.classList.remove('shaking');
            }, 2000);
        } else {
            res.innerHTML = `<div class="code-box"><pre>> EXEC ${t.toUpperCase()}_L${currentLevel} \n> RESULT: ${repo[t][currentLevel]}</pre></div>`;
        }
    }

    // تعبئة الموسوعة ببيانات سوداوية
    const infoItems = document.getElementById('infoItems');
    for(let i=1; i<=100; i++) {
        infoItems.innerHTML += `<div style="padding:10px; border-bottom:1px solid #111; font-size:0.7rem; color:#444;">
            [DATA_POINT_${i}] : خوارزمية رضا رقم ${Math.floor(Math.random()*999)} فعالة بنسبة 99%.
        </div>`;
    }
</script>
</body>
</html>
