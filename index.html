<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر رضا المطور | الموسوعة الشاملة</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --lvl1: #4ade80;
            --lvl2: #fbbf24;
            --lvl3: #f87171;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية للمعلومات (100 معلومة) */
        .sidebar {
            width: 400px;
            background: #020617;
            border-left: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            transition: 0.5s;
            position: fixed;
            right: -400px; /* مخفية في البداية */
            height: 100vh;
            z-index: 1000;
        }

        .sidebar.active { right: 0; }

        .sidebar-header { 
            padding: 20px; 
            background: var(--accent); 
            color: #000; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between;
        }

        .info-list { overflow-y: auto; padding: 15px; flex: 1; }
        .info-item { 
            background: #1e293b; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            line-height: 1.6;
            border-right: 3px solid var(--accent);
        }

        .code-in-text { color: #facc15; font-family: monospace; font-weight: bold; direction: ltr; display: inline-block; }

        /* المحتوى الرئيسي */
        .main-content { 
            flex: 1; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto;
            width: 100%;
        }

        .card { 
            background: var(--panel); 
            width: 95%; 
            max-width: 850px; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        /* التحكم في المستويات */
        .level-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
        }

        .level-btn {
            border: 2px solid transparent;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: #334155;
            color: white;
        }

        .level-btn.active.l1 { background: var(--lvl1); color: #000; border-color: #fff; }
        .level-btn.active.l2 { background: var(--lvl2); color: #000; border-color: #fff; }
        .level-btn.active.l3 { background: var(--lvl3); color: #000; border-color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .type-btn { 
            background: #0f172a; 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .type-btn:hover { background: var(--accent); color: #000; }

        /* عرض الأكواد */
        .results-area { margin-top: 30px; }
        .code-box { 
            background: #000; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border-right: 4px solid var(--accent);
            position: relative;
        }
        .code-box pre { margin: 0; color: #4ade80; font-family: 'Consolas', monospace; direction: ltr; white-space: pre-wrap; }
        .model-label { color: var(--accent); font-size: 0.7rem; position: absolute; top: 5px; left: 10px; }

        .learn-trigger {
            background: #f59e0b;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span>موسوعة الـ 100 معلومة</span>
        <button onclick="toggleSidebar()" style="cursor:pointer; background:none; border:none; font-weight:bold;">X</button>
    </div>
    <div class="info-list" id="infoItems">
        </div>
</div>

<div class="main-content">
    <button class="learn-trigger" onclick="toggleSidebar()">📖 زر تعلم (الموسوعة الشاملة)</button>

    <div class="card">
        <h1 style="text-align:center; color: var(--accent);">مختبر رضا المطور V4</h1>
        <p style="text-align:center; color: #94a3b8;">نظام المستويات المتقدم لتوليد وفهم الأكواد</p>
        
        <div class="level-container">
            <button class="level-btn l1 active" onclick="setLevel(1, this)">المستوى 1</button>
            <button class="level-btn l2" onclick="setLevel(2, this)">المستوى 2</button>
            <button class="level-btn l3" onclick="setLevel(3, this)">المستوى 3</button>
        </div>

        <div class="grid">
            <button class="type-btn" onclick="generate('logic')">قنبلة منطقية</button>
            <button class="type-btn" onclick="generate('fork')">قنبلة تشعب</button>
            <button class="type-btn" onclick="generate('crash')">قنبلة ذاكرة</button>
        </div>

        <div id="results" class="results-area"></div>
    </div>
</div>

<script>
    let currentLevel = 1;

    // 1. تفعيل التبديل الجانبي
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // 2. تفعيل المستويات
    function setLevel(lvl, btn) {
        currentLevel = lvl;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 3. توليد الـ 100 معلومة برمجياً
    const infoItems = document.getElementById('infoItems');
    const infoData = [
        {txt: "القنبلة المنطقية تعمل عند تاريخ معين", code: "if(date > x)"},
        {txt: "قنبلة التشعب تستهلك العمليات", code: "fork()"},
        {txt: "تكرار الذاكرة يغلق المتصفح", code: "while(true){ a += a }"},
        {txt: "الحماية تعتمد على مراقبة الموارد", code: "monitor_cpu()"},
        {txt: "استخدام الصلاحيات المحدودة يمنع الهجوم", code: "chmod 700"},
    ];

    for (let i = 1; i <= 100; i++) {
        let data = infoData[(i-1) % infoData.length];
        infoItems.innerHTML += `
            <div class="info-item">
                <strong>معلومة ${i}:</strong> ${data.txt} 
                ويتم ذلك عبر الكود التالي: <span class="code-in-text">(${data.code})</span>.
                طريقة الإيقاف تكون عبر تعطيل الـ Scripts في الإعدادات.
            </div>
        `;
    }

    // 4. قاعدة بيانات الأكواد لكل مستوى
    const repo = {
        logic: {
            1: ["if(new Date() > '2026-01-01') { alert('Start'); }"],
            2: ["setTimeout(() => { document.body.innerHTML = 'Hacked'; }, 5000);", "setInterval(() => { window.open(); }, 1000);"],
            3: ["window.onbeforeunload = () => true;", "while(true) { history.pushState(null,null,location.href); }"]
        },
        fork: {
            1: ["for(let i=0; i<100; i++) { console.log(i); }"],
            2: ["function x() { setTimeout(x, 10); setTimeout(x, 10); } x();"],
            3: [":(){ :|:& };:", "while(1) { fork(); } // C Code", "import os\nwhile True: os.fork() // Python"]
        },
        crash: {
            1: ["alert('Memory Full');"],
            2: ["var s = 'leak'; while(true) { s += s; }"],
            3: ["const r = []; setInterval(() => { r.push(new Array(1000000).fill('!')); }, 10);", "while(true) { window.open('','','width=10,height=10'); }"]
        }
    };

    function generate(type) {
        const res = document.getElementById('results');
        res.innerHTML = '';
        const codes = repo[type][currentLevel];
        
        codes.forEach((c, index) => {
            res.innerHTML += `
                <div class="code-box">
                    <span class="model-label">النموذج ${index+1} - مستوى ${currentLevel}</span>
                    <pre>${c}</pre>
                </div>
            `;
        });
    }
</script>

</body>
</html>
