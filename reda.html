<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Reda Lab | مختبر دكتور رضا</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; text-align: center; padding: 50px; }
        .box { border: 2px solid #00ff41; padding: 20px; border-radius: 10px; display: inline-block; background: #000; box-shadow: 0 0 15px #00ff41; }
        input { background: #111; color: #00ff41; border: 1px solid #00ff41; padding: 10px; margin: 10px; width: 80%; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        button:hover { background: #008f11; color: white; }
        textarea { width: 90%; margin-top: 20px; background: #000; color: #00ff41; border: 1px dotted #00ff41; }
    </style>
</head>
<body>
    <div class="box">
        <h2>[+] مـوَلـد المـواقـع التـلقـائي [+]</h2>
        <p>أدخل اسم الموقع الذي تريد بناءه:</p>
        <input type="text" id="targetName" placeholder="مثلاً: موقع التحدي">
        <br>
        <button onclick="generate()">تـولـيـد الـكـود</button>
        <br>
        <textarea id="result" rows="8" readonly></textarea>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('targetName').value || "Reda Project";
            const code = `\n<html>\n<head><title>${name}</title></head>\n<body style='background:black; color:red; text-align:center;'>\n<h1>Target: ${name}</h1>\n<p>Status: Ready</p>\n</body>\n</html>`;
            document.getElementById('result').value = code;
            alert("تم توليد كود الموقع بنجاح!");
        }
    </script>
</body>
</html>
